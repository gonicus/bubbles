app-id: de.gonicus.Bubbles
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: bubbles
finish-args:
  - --share=ipc
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --share=network
  - --talk-name=org.freedesktop.Flatpak
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
cleanup:
  - /lib/crosvm-static
modules:
  # libcap for static crosvm build
  - name: libcap
    buildsystem: simple
    build-commands:
      - make -C libcap COPTS='-O2 -fPIC' GOLANG=no SHARED=no lib=lib
      - install -Dm644 libcap/libcap.a /app/lib/crosvm-static/libcap.a
      - install -Dm644 License /app/share/licenses/de.gonicus.Bubbles/libcap/License
      # Provide libm stub
      - ar rcs /app/lib/crosvm-static/libm.a
    sources:
      - type: archive
        url: https://mirrors.edge.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-2.78.tar.xz
        sha256: 0d621e562fd932ccf67b9660fb018e468a683d7b827541df27813228c996bb11
  - name: crosvm
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
      env:
        CARGO_HOME: /run/build/crosvm/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        RUSTFLAGS: -C target-feature=+crt-static -L /app/lib/crosvm-static
    build-commands:
      - cargo --offline build --release --target x86_64-unknown-linux-gnu
      - install -Dm755 target/x86_64-unknown-linux-gnu/release/crosvm /app/bin/crosvm
      - install -Dm644 crosvm-patches/LICENSE /app/share/licenses/de.gonicus.Bubbles/crosvm/LICENSE
    sources:
      - type: git
        name: crosvm
        url: https://chromium.googlesource.com/crosvm/crosvm
        commit: a96cb379acf55a75887cbba190666e7d22ff9dbf
      - type: patch
        paths:
          - patches/crosvm/0000-crosvm-reverts.patch
          - patches/crosvm/0001-passt-virtio-version.patch
          - patches/crosvm/0002-display-backend-stub.patch
          - patches/crosvm/0003-seccomp-madvise-guard.patch
          - patches/crosvm/0004-remove-wayland-display.patch
      - type: file
        path: patches/crosvm/LICENSE
        dest: crosvm-patches
        dest-filename: LICENSE
      - crosvm-cargo-sources.json
  - name: passt
    buildsystem: simple
    build-commands:
      - make passt passt.avx2 VERSION=2025_05_03.587980c CFLAGS="-static -DGLIBC_NO_STATIC_NSS"
        LDFLAGS="-static"
      - install -Dm755 passt /app/bin/passt
      - install -Dm755 passt.avx2 /app/bin/passt.avx2
      - install -Dm644 LICENSES/GPL-2.0-or-later.txt /app/share/licenses/de.gonicus.Bubbles/passt/GPL-2.0-or-later.txt
      - install -Dm644 LICENSES/BSD-3-Clause.txt /app/share/licenses/de.gonicus.Bubbles/passt/BSD-3-Clause.txt
    sources:
      - type: archive
        url: https://passt.top/passt/snapshot/passt-2025_05_07.eea8a76.tar.gz
        sha256: a6a903e0a6e3f7e1c84de82b0382f6f059f56da8b88018a68cb5eb4440bebd92
  - name: socat
    buildsystem: simple
    build-commands:
      - ./configure --disable-openssl --disable-readline --disable-libwrap
      - make socat LDFLAGS="-static"
      - install -Dm755 socat /app/bin/socat
      - install -Dm644 COPYING /app/share/licenses/de.gonicus.Bubbles/socat/COPYING
    sources:
      - type: archive
        url: http://www.dest-unreach.org/socat/download/socat-1.8.0.3.tar.bz2
        sha256: 01eb017361d95bb3a6941e840b59e4463a3fabf92df4154ed02b16a2ed6a0095
  - name: bubbles
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/bubbles/cargo
    build-commands:
      - cargo --offline build --release
      - install -Dm755 target/release/bubbles /app/bin/bubbles
      - install -Dm644 de.gonicus.Bubbles.desktop /app/share/applications/de.gonicus.Bubbles.desktop
      - install -Dm644 de.gonicus.Bubbles.appdata.xml /app/share/metainfo/de.gonicus.Bubbles.appdata.xml
      - install -Dm644 de.gonicus.Bubbles.svg /app/share/icons/hicolor/scalable/apps/de.gonicus.Bubbles.svg
    sources:
      - type: dir
        path: .
      - cargo-sources.json
